<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00c6ff;
    }

    .toggle {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #4facfe;
    }

    .hidden {
      display: none;
    }

    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Login Form -->
  <div id="loginForm">
    <h2>Student Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div class="error" id="loginError"></div>
    <button onclick="login()">Login</button>
    <div class="toggle" onclick="showRegister()">Don't have an account? Register</div>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="hidden">
    <h2>Student Registration</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <div class="error" id="registerError"></div>
    <button onclick="register()">Register</button>
    <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
  </div>

</div>

<script>
  function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
  }

  function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
  }

  function register() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let error = document.getElementById("registerError");

    if (!name || !email || !password || !confirmPassword) {
      error.textContent = "All fields are required!";
      return;
    }

    if (password !== confirmPassword) {
      error.textContent = "Passwords do not match!";
      return;
    }

    // Store in localStorage (demo purpose)
    localStorage.setItem("studentEmail", email);
    localStorage.setItem("studentPassword", password);

    alert("Registration successful!");
    showLogin();
  }

  function login() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;
    let error = document.getElementById("loginError");

    let storedEmail = localStorage.getItem("studentEmail");
    let storedPassword = localStorage.getItem("studentPassword");

    if (email === storedEmail && password === storedPassword) {
      alert("Login successful!");
    } else {
      error.textContent = "Invalid email or password!";
    }
  }
</script>

</body>
</html>
